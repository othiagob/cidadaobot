name: Build e Testes

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  compilacao:
    name: Validar compilação do projeto
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Validar compilação Maven
        run: ./mvnw clean compile

  testes:
    name: Executar testes automatizados
    runs-on: ubuntu-latest

    needs: compilacao

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Executar testes
        run: ./mvnw clean test

  build:
    name: Gerar build da aplicação
    runs-on: ubuntu-latest

    needs: testes

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Gerar pacote Maven
        run: ./mvnw package -DskipTests
