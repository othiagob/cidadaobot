name: Build e Testes

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  compilacao:
    name: Validar compilação - Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Validar compilação Maven
        run: ./mvnw clean compile

  testes-rapidos:
    name: Executar testes rápidos - Java ${{ matrix.java }}
    runs-on: ubuntu-latest

    needs: compilacao

    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Executar testes rápidos
        run: ./mvnw clean test

  testes-integracao:
    name: Executar testes de integração - Java 17
    runs-on: ubuntu-latest

    needs: testes-rapidos

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Verificar Docker disponível no runner
        run: docker version

      - name: Executar validação completa com testes de integração
        run: ./mvnw verify

  build:
    name: Gerar build oficial da aplicação - Java 17
    runs-on: ubuntu-latest

    needs: testes-integracao

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v5

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Gerar pacote Maven
        run: ./mvnw clean package -DskipTests
