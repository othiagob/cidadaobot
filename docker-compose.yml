services:
  postgres:
    image: postgres:15
    container_name: cidadaobot-postgres

    environment:
      POSTGRES_DB: cidadaobot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - cidadaobot-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cidadaobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cidadaobot-api

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cidadaobot
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres

    ports:
      - "8080:8080"

volumes:
  cidadaobot-postgres-data:
